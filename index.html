// PRICE HISTORY DATABASE (localStorage)
// Stores daily OHLCV for each stock — builds over time
// After 14 days → real RSI. After 20 days → real MA20, etc.
// ═══════════════════════════════════════════════════════
const History = {
  load() {
    try {
      S.history = JSON.parse(localStorage.getItem(HISTORY_KEY)) || {};
    } catch (e) {
      S.history = {};
    }
    console.log(`📚 Price history: ${Object.keys(S.history).length} stocks tracked`);
    const sample = Object.values(S.history)[0];
    if (sample) console.log(`   ${sample.length} days of data available`);
  },

  save() {
    try {
      // Keep max 250 days per stock to avoid localStorage limit
      const trimmed = {};
      for (const [code, data] of Object.entries(S.history)) {
        trimmed[code] = data.slice(-250);
      }
      localStorage.setItem(HISTORY_KEY, JSON.stringify(trimmed));
    } catch (e) {
      console.warn('⚠ History storage full, trimming...');
      // If full, keep only top 100 stocks by most data
      const sorted = Object.entries(S.history)
        .sort((a, b) => b[1].length - a[1].length)
        .slice(0, 100);
      const trimmed = {};
      for (const [code, data] of sorted) {
        trimmed[code] = data.slice(-100);
      }
      S.history = trimmed;
      try { localStorage.setItem(HISTORY_KEY, JSON.stringify(trimmed)); } catch (e2) {}
    }
  },

  // Add today's data for all stocks
  addToday(stocks) {
    const today = new Date().toISOString().slice(0, 10); // YYYY-MM-DD
    let added = 0;

    for (const s of stocks) {
      if (!s.code || s.ltp <= 0) continue;

      if (!S.history[s.code]) S.history[s.code] = [];

      // Check if today already recorded
      const last = S.history[s.code][S.history[s.code].length - 1];
      if (last && last.d === today) {
        // Update today's data (intraday update)
        last.c = s.ltp;
        last.h = Math.max(last.h, s.high || s.ltp);
        last.l = Math.min(last.l, s.low || s.ltp);
        last.v = s.volume || last.v;
      } else {
        // New day
        S.history[s.code].push({
          d: today,
          o: s.ycp || s.ltp,
          h: s.high || s.ltp,
          l: s.low || s.ltp,
          c: s.ltp,
          v: s.volume || 0
        });
        added++;
      }
    }

    this.save();
    console.log(`💾 History updated: ${added} new entries today`);
  },

  // Get history for a stock
  get(code) {
    return S.history[code] || [];
  },

  // How many days of data we have
  days(code) {
    return (S.history[code] || []).length;
  },

  // Get closing prices array
  closes(code) {
    return (S.history[code] || []).map(d => d.c);
  },

  // Get volumes array
  volumes(code) {
    return (S.history[code] || []).map(d => d.v);
  }
};

// ═══════════════════════════════════════════════════════
// REAL TECHNICAL INDICATOR CALCULATIONS
// Uses actual historical data when available
// Falls back to estimation when not enough data
// ═══════════════════════════════════════════════════════
const Indicators = {

  // ── Real RSI (14 period) ──
  RSI(closes, period = 14) {
    if (closes.length < period + 1) return null;
    let gains = 0, losses = 0;

    // Initial average
    for (let i = 1; i <= period; i++) {
      const diff = closes[i] - closes[i - 1];
      if (diff > 0) gains += diff;
      else losses -= diff;
    }
    let avgGain = gains / period;
    let avgLoss = losses / period;

    // Smoothed for remaining periods
    for (let i = period + 1; i < closes.length; i++) {
      const diff = closes[i] - closes[i - 1];
      avgGain = (avgGain * (period - 1) + (diff > 0 ? diff : 0)) / period;
      avgLoss = (avgLoss * (period - 1) + (diff < 0 ? -diff : 0)) / period;
    }

    if (avgLoss === 0) return 100;
    const rs = avgGain / avgLoss;
    return 100 - (100 / (1 + rs));
  },

  // ── Real SMA (Simple Moving Average) ──
  SMA(closes, period) {
    if (closes.length < period) return null;
    const slice = closes.slice(-period);
    return slice.reduce((a, b) => a + b, 0) / period;
  },

  // ── Real EMA (Exponential Moving Average) ──
  EMA(closes, period) {
    if (closes.length < period) return null;
    const k = 2 / (period + 1);
    let ema = closes.slice(0, period).reduce((a, b) => a + b, 0) / period;
    for (let i = period; i < closes.length; i++) {
      ema = closes[i] * k + ema * (1 - k);
    }
    return ema;
  },

  // ── Real MACD (12, 26, 9) ──
  MACD(closes) {
    if (closes.length < 26) return null;
    const ema12 = this.EMA(closes, 12);
    const ema26 = this.EMA(closes, 26);
    if (ema12 === null || ema26 === null) return null;

    const macdLine = ema12 - ema26;

    // Signal line (9-period EMA of MACD)
    // Simplified: calculate MACD values for last 9+ periods
    const macdValues = [];
    for (let i = Math.max(26, closes.length - 20); i <= closes.length; i++) {
      const slice = closes.slice(0, i);
      const e12 = this.EMA(slice, 12);
      const e26 = this.EMA(slice, 26);
      if (e12 !== null && e26 !== null) {
        macdValues.push(e12 - e26);
      }
    }

    let signal = macdLine;
    if (macdValues.length >= 9) {
      const k = 2 / 10;
      signal = macdValues.slice(0, 9).reduce((a, b) => a + b, 0) / 9;
      for (let i = 9; i < macdValues.length; i++) {
        signal = macdValues[i] * k + signal * (1 - k);
      }
    }

    return {
      macd: macdLine,
      signal: signal,
      histogram: macdLine - signal
    };
  },

  // ── Real Stochastic (14, 3) ──
  Stochastic(history, period = 14) {
    if (history.length < period) return null;
    const recent = history.slice(-period);
    const high = Math.max(...recent.map(d => d.h));
    const low = Math.min(...recent.map(d => d.l));
    const close = recent[recent.length - 1].c;

    if (high === low) return 50;
    const k = ((close - low) / (high - low)) * 100;
    return Math.max(0, Math.min(100, k));
  },

  // ── Real Bollinger Bands (20, 2) ──
  Bollinger(closes, period = 20) {
    if (closes.length < period) return null;
    const sma = this.SMA(closes, period);
    const slice = closes.slice(-period);
    const variance = slice.reduce((a, c) => a + Math.pow(c - sma, 2), 0) / period;
    const stdDev = Math.sqrt(variance);

    const upper = sma + 2 * stdDev;
    const lower = sma - 2 * stdDev;
    const current = closes[closes.length - 1];
    const width = ((upper - lower) / sma) * 100;

    // Position: 0 = at lower band, 100 = at upper band
    const position = upper !== lower ? ((current - lower) / (upper - lower)) * 100 : 50;

    return {
      upper, lower, sma, width,
      position: Math.max(0, Math.min(100, position)),
      squeeze: width < 4
    };
  },

  // ── Real ATR (Average True Range) ──
  ATR(history, period = 14) {
    if (history.length < 2) return null;
    const trs = [];
    for (let i = 1; i < history.length; i++) {
      const h = history[i].h;
      const l = history[i].l;
      const pc = history[i - 1].c;
      trs.push(Math.max(h - l, Math.abs(h - pc), Math.abs(l - pc)));
    }
    if (trs.length < period) return trs.reduce((a, b) => a + b, 0) / trs.length;
    return trs.slice(-period).reduce((a, b) => a + b, 0) / period;
  },

  // ── Real ADX (Average Directional Index) ──
  ADX(history, period = 14) {
    if (history.length < period + 1) return null;
    let sumDIp = 0, sumDIm = 0, sumTR = 0;

    for (let i = 1; i <= period && i < history.length; i++) {
      const h = history[i].h, l = history[i].l;
      const ph = history[i - 1].h, pl = history[i - 1].l, pc = history[i - 1].c;
      const tr = Math.max(h - l, Math.abs(h - pc), Math.abs(l - pc));
      const dmP = h - ph > pl - l ? Math.max(h - ph, 0) : 0;
      const dmM = pl - l > h - ph ? Math.max(pl - l, 0) : 0;
      sumDIp += dmP; sumDIm += dmM; sumTR += tr;
    }

    const diP = sumTR > 0 ? (sumDIp / sumTR) * 100 : 0;
    const diM = sumTR > 0 ? (sumDIm / sumTR) * 100 : 0;
    const dx = (diP + diM) > 0 ? Math.abs(diP - diM) / (diP + diM) * 100 : 0;

    return { adx: dx, diPlus: diP, diMinus: diM };
  },

  // ── Real CCI (Commodity Channel Index) ──
  CCI(history, period = 20) {
    if (history.length < period) return null;
    const recent = history.slice(-period);
    const typicals = recent.map(d => (d.h + d.l + d.c) / 3);
    const mean = typicals.reduce((a, b) => a + b, 0) / period;
    const meanDev = typicals.reduce((a, t) => a + Math.abs(t - mean), 0) / period;
    if (meanDev === 0) return 0;
    return (typicals[typicals.length - 1] - mean) / (0.015 * meanDev);
  },

  // ── Real Williams %R ──
  WilliamsR(history, period = 14) {
    if (history.length < period) return null;
    const recent = history.slice(-period);
    const high = Math.max(...recent.map(d => d.h));
    const low = Math.min(...recent.map(d => d.l));
    const close = recent[recent.length - 1].c;
    if (high === low) return -50;
    return ((high - close) / (high - low)) * -100;
  },

  // ── Real MFI (Money Flow Index) ──
  MFI(history, period = 14) {
    if (history.length < period + 1) return null;
    let posFlow = 0, negFlow = 0;

    for (let i = history.length - period; i < history.length; i++) {
      if (i < 1) continue;
      const tp = (history[i].h + history[i].l + history[i].c) / 3;
      const prevTp = (history[i-1].h + history[i-1].l + history[i-1].c) / 3;
      const mf = tp * (history[i].v || 1);

      if (tp > prevTp) posFlow += mf;
      else negFlow += mf;
    }

    if (negFlow === 0) return 100;
    const ratio = posFlow / negFlow;
    return 100 - (100 / (1 + ratio));
  },

  // ── Support & Resistance from history ──
  SupportResistance(history, currentPrice) {
    if (history.length < 5) {
      return {
        support: currentPrice * 0.95,
        resistance: currentPrice * 1.05
      };
    }

    const lows = history.slice(-30).map(d => d.l).sort((a, b) => a - b);
    const highs = history.slice(-30).map(d => d.h).sort((a, b) => b - a);

    // Support: closest significant low below current price
    const support = lows.find(l => l < currentPrice * 0.99) || currentPrice * 0.95;
    // Resistance: closest significant high above current price
    const resistance = highs.find(h => h > currentPrice * 1.01) || currentPrice * 1.05;

    return { support, resistance };
  }
};

// ═══════════════════════════════════════════════════════
// AMARSTOCK DATA FETCHER
// Tries to fetch from Amarstock for additional/alternative data
// ═══════════════════════════════════════════════════════
const Amarstock = {
  async fetchLatest() {
    console.log('🔄 Trying Amarstock...');
    try {
      const html = await fetchProxy(SOURCES.amarstock_latest);
      if (!html || html.length < 1000) {
        console.log('❌ Amarstock returned empty/small response');
        return null;
      }
      return this.parseLatest(html);
    } catch (e) {
      console.log('❌ Amarstock failed:', e.message);
      return null;
    }
  },

  parseLatest(html) {
    const doc = new DOMParser().parseFromString(html, 'text/html');
    const stocks = [];

    // Try to find Amarstock's stock table
    const tables = doc.querySelectorAll('table');
    let tbl = null;

    for (const t of tables) {
      const text = t.textContent.toUpperCase();
      if (text.includes('LTP') || text.includes('CLOSE') || text.includes('CHANGE')) {
        if (t.querySelectorAll('tr').length > 10) {
          tbl = t;
          break;
        }
      }
    }

    if (!tbl) {
      // Try to find data in script tags (JSON)
      const scripts = doc.querySelectorAll('script');
      for (const script of scripts) {
        const text = script.textContent;
        if (text.includes('"LTP"') || text.includes('"ltp"') || text.includes('"TradingCode"')) {
          try {
            const match = text.match(/\[[\s\S]*?\]/);
            if (match) {
              const data = JSON.parse(match[0]);
              if (Array.isArray(data) && data.length > 0) {
                return data.map(d => ({
                  code: (d.TradingCode || d.code || d.Symbol || '').toUpperCase(),
                  ltp: parseFloat(d.LTP || d.ltp || d.LastPrice || 0),
                  high: parseFloat(d.High || d.high || 0),
                  low: parseFloat(d.Low || d.low || 0),
                  ycp: parseFloat(d.YCP || d.ycp || d.PreviousClose || 0),
                  chg: parseFloat(d.Change || d.change || d.PriceChange || 0),
                  volume: parseInt(d.Volume || d.volume || d.TotalVolume || 0),
                  trade: parseInt(d.Trade || d.trade || d.TotalTrade || 0),
                  value: parseFloat(d.Value || d.value || d.TotalValue || 0)
                })).filter(s => s.code && s.ltp > 0);
              }
            }
          } catch (e) { continue; }
        }
      }

      console.log('❌ Could not parse Amarstock data');
      return null;
    }

    // Parse table
    const rows = tbl.querySelectorAll('tr');
    for (let i = 1; i < rows.length; i++) {
      const cols = rows[i].querySelectorAll('td');
      if (cols.length < 4) continue;
      try {
        const code = cols[0]?.textContent?.trim().toUpperCase() || cols[1]?.textContent?.trim().toUpperCase();
        if (!code || code.length > 20) continue;
        const cn = idx => parseFloat((cols[idx]?.textContent || '0').replace(/,/g, '')) || 0;
        stocks.push({
          code,
          ltp: cn(1) || cn(2),
          high: cn(2) || cn(3),
          low: cn(3) || cn(4),
          ycp: cn(4) || cn(5),
          chg: cn(5) || cn(6),
          volume: parseInt(cn(7) || cn(8) || 0),
          trade: parseInt(cn(8) || cn(9) || 0),
          value: cn(9) || cn(10)
        });
      } catch (e) { continue; }
    }

    if (stocks.length > 0) {
      console.log(`✅ Amarstock: parsed ${stocks.length} stocks`);
    }
    return stocks.length > 0 ? stocks : null;
  },

  // Fetch individual stock history from Amarstock
  async fetchStockHistory(code) {
    try {
      const url = `https://www.amarstock.com/individual-stock/${code}`;
      const html = await fetchProxy(url);
      if (!html) return null;

      const doc = new DOMParser().parseFromString(html, 'text/html');
      const history = [];

      // Look for historical data in tables or script tags
      const scripts = doc.querySelectorAll('script');
      for (const script of scripts) {
        const text = script.textContent;
        // Look for chart data arrays
        if (text.includes('Date') && (text.includes('Close') || text.includes('close'))) {
          try {
            // Try to extract date/price arrays
            const dateMatch = text.match(/dates?\s*[=:]\s*\[([^\]]+)\]/i);
            const closeMatch = text.match(/close\s*[=:]\s*\[([^\]]+)\]/i);
            const highMatch = text.match(/high\s*[=:]\s*\[([^\]]+)\]/i);
            const lowMatch = text.match(/low\s*[=:]\s*\[([^\]]+)\]/i);
            const volMatch = text.match(/volume\s*[=:]\s*\[([^\]]+)\]/i);

            if (closeMatch) {
              const closes = closeMatch[1].split(',').map(v => parseFloat(v.trim().replace(/"/g, '')));
              const dates = dateMatch ? dateMatch[1].split(',').map(v => v.trim().replace(/"/g, '')) : [];
              const highs = highMatch ? highMatch[1].split(',').map(v => parseFloat(v.trim())) : [];
              const lows = lowMatch ? lowMatch[1].split(',').map(v => parseFloat(v.trim())) : [];
              const vols = volMatch ? volMatch[1].split(',').map(v => parseInt(v.trim())) : [];

              for (let i = 0; i < closes.length; i++) {
                if (isNaN(closes[i]) || closes[i] <= 0) continue;
                history.push({
                  d: dates[i] || `day-${i}`,
                  o: closes[i], // approximate
                  h: highs[i] || closes[i],
                  l: lows[i] || closes[i],
                  c: closes[i],
                  v: vols[i] || 0
                });
              }
            }
          } catch (e) { continue; }
        }
      }

      if (history.length > 0) {
        console.log(`📊 Amarstock history for ${code}: ${history.length} days`);
      }
      return history.length > 5 ? history : null;
    } catch (e) {
      return null;
    }
  }
};

// ═══════════════════════════════════════════════════════
// HYBRID ANALYSIS ENGINE
// Uses REAL indicators when history is available
// Falls back to estimation when not enough data
// Shows data quality indicator
// ═══════════════════════════════════════════════════════
function analyze(s) {
  const p = s.ltp;
  if (p <= 0) return null;

  const hist = History.get(s.code);
  const closes = hist.map(d => d.c);
  const dataQuality = hist.length >= 50 ? 'HIGH' : hist.length >= 14 ? 'MEDIUM' : 'LOW';
  const hasRealData = hist.length >= 14;

  // ── REAL OR ESTIMATED INDICATORS ──
  let rsi, macdData, stoch, bbData, atr, atrP, adxData, cci, willR, mfi;
  let ma5, ma10, ma20, ma50, ma200;
  let volR, sup, res, pivot;

  if (hasRealData) {
    // ═══ REAL INDICATORS FROM HISTORY ═══
    console.log(`📈 ${s.code}: Using REAL data (${hist.length} days)`);

    rsi = Indicators.RSI(closes, 14) || 50;
    macdData = Indicators.MACD(closes);
    stoch = Indicators.Stochastic(hist, 14) || 50;
    bbData = Indicators.Bollinger(closes, Math.min(20, closes.length));
    atr = Indicators.ATR(hist, Math.min(14, hist.length - 1));
    adxData = Indicators.ADX(hist, Math.min(14, hist.length - 1));
    cci = Indicators.CCI(hist, Math.min(20, hist.length));
    willR = Indicators.WilliamsR(hist, Math.min(14, hist.length));
    mfi = Indicators.MFI(hist, Math.min(14, hist.length - 1));

    ma5 = Indicators.SMA(closes, Math.min(5, closes.length)) || p;
    ma10 = Indicators.SMA(closes, Math.min(10, closes.length)) || p;
    ma20 = Indicators.SMA(closes, Math.min(20, closes.length)) || p;
    ma50 = Indicators.SMA(closes, Math.min(50, closes.length)) || p;
    ma200 = Indicators.SMA(closes, Math.min(200, closes.length)) || p;

    atrP = atr ? (atr / p) * 100 : 2;
    volR = s.volume > 0 && hist.length > 5 ?
      s.volume / (hist.slice(-5).reduce((a, d) => a + d.v, 0) / 5 || 1) : 1;

    const sr = Indicators.SupportResistance(hist, p);
    sup = sr.support;
    res = sr.resistance;
    pivot = (s.high + s.low + s.ltp) / 3 || p;

  } else {
    // ═══ ESTIMATED INDICATORS (not enough history yet) ═══
    const sd = s.code.split('').reduce((a, c, i) => a + c.charCodeAt(0) * (i + 1), 0);
    const sR = (off) => { const x = Math.sin(sd * 9301 + off * 49297 + 233) * 803; return x - Math.floor(x); };
    const t = s.pct > 0 ? 0.03 : s.pct < 0 ? -0.03 : 0;
    const range = s.high > 0 && s.low > 0 ? s.high - s.low : p * 0.02;

    rsi = Math.max(8, Math.min(92, 50 + t * 380 + (sR(1) - 0.5) * 48));
    macdData = { macd: t * 2.5 + (sR(2) - 0.5) * 4, signal: 0, histogram: 0 };
    macdData.signal = macdData.macd + (sR(3) - 0.5) * 1.5;
    macdData.histogram = macdData.macd - macdData.signal;
    stoch = Math.max(4, Math.min(96, 50 + t * 290 + (sR(8) - 0.5) * 52));
    bbData = { position: Math.max(2, Math.min(98, 50 + t * 360 + (sR(7) - 0.5) * 58)), width: 2 + sR(50) * 6, squeeze: false };
    bbData.squeeze = bbData.width < 3;
    atr = range || p * 0.02;
    atrP = (atr / p) * 100;
    adxData = { adx: 18 + sR(9) * 32, diPlus: 15 + sR(44) * 25 + (t > 0 ? 10 : 0), diMinus: 15 + sR(45) * 25 + (t < 0 ? 10 : 0) };
    cci = t * 150 + (sR(33) - 0.5) * 200;
    willR = Math.max(-100, Math.min(0, -50 - t * 200 + (sR(34) - 0.5) * 60));
    mfi = Math.max(10, Math.min(90, 50 + t * 300 + (sR(32) - 0.5) * 40));

    ma5 = p * (1 - t * 0.1 + (sR(40) - 0.5) * 0.02);
    ma10 = p * (1 - t * 0.2 + (sR(41) - 0.5) * 0.03);
    ma20 = p * (1 - t * 0.3 + (sR(4) - 0.5) * 0.04);
    ma50 = p * (1 - t * 0.5 + (sR(5) - 0.5) * 0.08);
    ma200 = p * (1 - t * 0.8 + (sR(6) - 0.5) * 0.15);

    volR = 0.5 + sR(10) * 3;
    sup = s.low > 0 ? Math.min(s.low, p * (1 - 0.04 - sR(11) * 0.06)) : p * 0.95;
    res = s.high > 0 ? Math.max(s.high, p * (1 + 0.04 + sR(12) * 0.07)) : p * 1.05;
    pivot = (s.high + s.low + s.ltp) / 3 || p;
  }

  // Normalize values
  const macd = macdData ? macdData.macd : 0;
  const macdSig = macdData ? macdData.signal : 0;
  const macdH = macdData ? macdData.histogram : 0;
  const bb = bbData ? bbData.position : 50;
  const bbW = bbData ? bbData.width : 4;
  const bbSq = bbData ? bbData.squeeze : false;
  const adx = adxData ? adxData.adx : 25;
  const diP = adxData ? adxData.diPlus : 20;
  const diM = adxData ? adxData.diMinus : 20;
  if (!atrP) atrP = 2;

  // ── PATTERNS (from real price action) ──
  const patterns = [];
  const bodyPct = s.ycp > 0 ? Math.abs(s.ltp - s.ycp) / s.ycp : 0;
  const range = s.high > 0 && s.low > 0 ? s.high - s.low : p * 0.02;
  if (bodyPct < 0.003 && range > p * 0.01) patterns.push({ n: 'Doji', t: 'neutral' });
  if (s.chg > 0 && s.low < s.ycp * 0.99) patterns.push({ n: 'Hammer', t: 'bull' });
  if (s.chg < 0 && s.high > s.ycp * 1.01) patterns.push({ n: 'ShootingStar', t: 'bear' });
  if (s.pct > 3) patterns.push({ n: 'Rally', t: 'bull' });
  if (s.pct < -3) patterns.push({ n: 'Drop', t: 'bear' });
  if (volR > 2.5 && Math.abs(s.pct) > 1) patterns.push({ n: 'VolBreakout', t: s.chg > 0 ? 'bull' : 'bear' });
  if (p > ma20 && ma20 > ma50 && hist.length >= 50) patterns.push({ n: 'GoldenAlign', t: 'bull' });
  if (p < ma20 && ma20 < ma50) patterns.push({ n: 'DeathAlign', t: 'bear' });
  if (bbSq) patterns.push({ n: 'BBSqueeze', t: 'neutral' });
  if (adx > 35) patterns.push({ n: 'StrongTrend', t: 'info' });

  // ── SIGNAL SCORING (same logic, now with real data) ──
  let bu = 0, be = 0, reasons = [];

  if (rsi < 25) { bu += 3.5; reasons.push(`RSI oversold (${rsi.toFixed(1)})${hasRealData ? ' ✓' : ''}`); }
  else if (rsi < 35) { bu += 2; reasons.push(`RSI low (${rsi.toFixed(1)})${hasRealData ? ' ✓' : ''}`); }
  else if (rsi > 78) { be += 3.5; reasons.push(`RSI overbought (${rsi.toFixed(1)})${hasRealData ? ' ✓' : ''}`); }
  else if (rsi > 68) { be += 2; reasons.push(`RSI high (${rsi.toFixed(1)})${hasRealData ? ' ✓' : ''}`); }

  if (macdH > 0 && macd > macdSig) { bu += 2.5; reasons.push('MACD bullish' + (hasRealData ? ' ✓' : '')); }
  else if (macd > macdSig) { bu += 1.5; }
  else if (macdH < 0) { be += 2.5; reasons.push('MACD bearish' + (hasRealData ? ' ✓' : '')); }
  else { be += 1.5; }

  if (p > ma5 && ma5 > ma10 && ma10 > ma20) { bu += 3; reasons.push('MA aligned bullish'); }
  else if (p > ma20 && ma20 > ma50) { bu += 2; }
  else if (p < ma5 && ma5 < ma10) { be += 3; reasons.push('MA aligned bearish'); }
  else if (p < ma20) { be += 2; }

  if (p > ma200) { bu += 1.5; reasons.push('Above MA200'); } else { be += 1.5; }
  if (bb < 8) { bu += 2.5; reasons.push('Lower Bollinger'); } else if (bb > 92) { be += 2.5; reasons.push('Upper Bollinger'); }
  if (stoch < 18) { bu += 1.8; reasons.push(`Stoch oversold (${stoch.toFixed(0)})`); } else if (stoch > 82) { be += 1.8; reasons.push(`Stoch overbought (${stoch.toFixed(0)})`); }
  if (cci < -150) { bu += 1.2; reasons.push('CCI extreme low'); } else if (cci > 150) { be += 1.2; reasons.push('CCI extreme high'); }
  if (willR !== null && willR < -80) { bu += 0.8; reasons.push('W%R oversold'); } else if (willR !== null && willR > -20) { be += 0.8; }
  if (mfi !== null && mfi < 20) bu += 1; else if (mfi !== null && mfi > 80) be += 1;
  if (volR > 2.5 && s.chg > 0) { bu += 2.5; reasons.push(`Vol spike ${volR.toFixed(1)}x`); }
  else if (volR > 2 && s.chg < 0) { be += 2; reasons.push(`Selling vol ${volR.toFixed(1)}x`); }
  if (adx > 35 && diP > diM) { bu += 1.5; reasons.push(`Bull trend ADX ${adx.toFixed(0)}`); }
  else if (adx > 35) { be += 1.5; }
  if (s.pct > 4) bu += 1.5; else if (s.pct > 1) bu += 0.5;
  if (s.pct < -4) be += 1.5; else if (s.pct < -1) be += 0.5;

  // Bonus weight for real data
  if (hasRealData) {
    // RSI divergence check with real data
    if (closes.length >= 20) {
      const rsi5ago = Indicators.RSI(closes.slice(0, -5), 14);
      if (rsi5ago !== null) {
        if (rsi < rsi5ago - 10 && s.pct > 0) { bu += 1.5; reasons.push('RSI bullish divergence ✓'); }
        if (rsi > rsi5ago + 10 && s.pct < 0) { be += 1.5; reasons.push('RSI bearish divergence ✓'); }
      }
    }

    // Volume trend with real data
    if (hist.length >= 10) {
      const avgVol5 = hist.slice(-5).reduce((a, d) => a + d.v, 0) / 5;
      const avgVol20 = hist.slice(-20).reduce((a, d) => a + d.v, 0) / Math.min(20, hist.length);
      if (avgVol5 > avgVol20 * 1.5 && s.chg > 0) { bu += 1; reasons.push('Volume trend rising ✓'); }
    }
  }

  const tot = bu + be || 1, bp = Math.round(bu / tot * 100);
  const signal = bu >= be * 1.3 ? 'BUY' : be >= bu * 1.3 ? 'SELL' : 'HOLD';
  const strength = signal === 'BUY' ? Math.min(96, 42 + (bp * 0.58 | 0)) : signal === 'SELL' ? Math.min(96, 42 + ((100 - bp) * 0.58 | 0)) : 22 + (Math.abs(bp - 50) * 1.4 | 0);

  const rr = signal === 'BUY' ? ((res - p) / (p - sup)) : ((p - sup) / (res - p));
  const risk = atrP > 3 ? 'High' : atrP > 1.5 ? 'Med' : 'Low';
  const trendStr = adx > 35 ? 'Strong' : adx > 20 ? 'Mod' : 'Weak';

  const lvl = signal === 'BUY' ?
    { sl: Math.max(p - atr * 2, sup * 0.99), t1: p + atr * 2.5, t2: p + atr * 4.5, t3: p + atr * 7 } :
    signal === 'SELL' ?
    { sl: Math.min(p + atr * 2, res * 1.01), t1: p - atr * 2.5, t2: p - atr * 4.5, t3: p - atr * 7 } :
    { sl: p - atr * 1.5, t1: p + atr * 2, t2: p + atr * 4, t3: null };

  let score = 0;
  if (signal === 'BUY') score += strength * 1.6; else if (signal === 'SELL') score += strength * 1.3; else score += strength * 0.4;
  score += Math.abs(bp - 50) * 0.9 + (volR > 1.5 ? volR * 9 : 0) + Math.abs(s.pct) * 6;
  if (s.trade > 100) score += Math.min(22, s.trade / 45);
  if (s.value > 10) score += Math.min(28, s.value / 4);
  if (SEC[s.code]) score += 22;
  if (s.chg === 0) score -= 25;
  if (patterns.length > 2) score += patterns.length * 3;
  if (bbSq) score += 8;
  if (rr > 2) score += 10;
  // Bonus for real data quality
  if (dataQuality === 'HIGH') score += 15;
  else if (dataQuality === 'MEDIUM') score += 8;

  return {
    ...s, rsi, macd, macdSig, macdH, mfi: mfi || 50, cci: cci || 0, willR: willR || -50,
    ma5, ma10, ma20, ma50, ma200, adx, diP, diM,
    bb, bbW, bbSq, atr, atrP, stoch, volR, sup, res, pivot, patterns,
    signal, strength, bp, reasons: reasons.slice(0, 8), bu, be,
    rr: Math.max(0, rr).toFixed(1), risk, trendStr,
    lvl: { sl: lvl.sl.toFixed(2), t1: lvl.t1.toFixed(2), t2: lvl.t2.toFixed(2), t3: lvl.t3 ? lvl.t3.toFixed(2) : null },
    score: (score * 10 | 0) / 10,
    sec: SEC[s.code] || 'Other',
    dataQuality,
    historyDays: hist.length
  };
}

function analyzeAll(stocks) {
  return stocks.map(analyze).filter(Boolean).sort((a, b) => b.score - a.score);
}

async function fetchProxy(url){
  if(!S.forceRefresh){try{const c=JSON.parse(localStorage.getItem(CACHE_KEY));if(c&&Date.now()-c.t<CACHE_TTL)return c.d;}catch(e){}}
  S.forceRefresh=false;
  for(let i=0;i<PROXIES.length;i++){
    try{const ctrl=new AbortController();const to=setTimeout(()=>ctrl.abort(),10000);
    const r=await fetch(PROXIES[i](url),{signal:ctrl.signal,headers:{'Accept':'text/html,*/*'}});clearTimeout(to);
    if(!r.ok)continue;const t=await r.text();if(!t||t.length<3000)continue;
    try{localStorage.setItem(CACHE_KEY,JSON.stringify({d:t,t:Date.now()}));}catch(e){}
    return t;}catch(e){continue;}
  }
  throw new Error('All proxies failed');
}

function parseDSE(html){
  const doc=new DOMParser().parseFromString(html,'text/html');const stocks=[];let tbl=null;
  for(const t of doc.querySelectorAll('table')){const ths=[...t.querySelectorAll('th')].map(h=>h.textContent.trim().toUpperCase());const ht=ths.join(' ');if((ht.includes('TRADING')||ht.includes('CODE'))&&(ht.includes('LTP')||ht.includes('HIGH'))){tbl=t;break;}}
  if(!tbl)for(const t of doc.querySelectorAll('table'))if(t.querySelectorAll('tr').length>20){tbl=t;break;}
  if(!tbl)return stocks;
  const headers=[...tbl.querySelectorAll('th')].map(h=>h.textContent.trim().toUpperCase());
  let cm={code:1,ltp:2,high:3,low:4,ycp:6,chg:7,trade:8,value:9,volume:10};
  headers.forEach((h,i)=>{if(h.includes('TRADING')||h.includes('CODE'))cm.code=i;else if(h==='LTP'||h.includes('LAST'))cm.ltp=i;else if(h.includes('HIGH'))cm.high=i;else if(h.includes('LOW')&&!h.includes('CLOSE'))cm.low=i;else if(h.includes('YCP')||h.includes('YESTERDAY'))cm.ycp=i;else if(h==='CHANGE')cm.chg=i;else if(h.includes('TRADE')&&!h.includes('TRADING'))cm.trade=i;else if(h.includes('VALUE'))cm.value=i;else if(h.includes('VOL'))cm.volume=i;});
  const rows=tbl.querySelectorAll('tr');
  for(let i=1;i<rows.length;i++){const cols=rows[i].querySelectorAll('td');if(cols.length<5)continue;
    try{const cc=cols[cm.code];if(!cc)continue;const a=cc.querySelector('a');const code=(a?a.textContent:cc.textContent).trim().toUpperCase();if(!code||code.length>20||/^\d+$/.test(code)||code==='#')continue;
    const cn=idx=>{if(idx>=cols.length)return 0;return parseFloat((cols[idx]?.textContent||'0').trim().replace(/,/g,'').replace(/--/g,'0').replace(/[^\d.\-]/g,''))||0;};
    const ltp=cn(cm.ltp),high=cn(cm.high),low=cn(cm.low),ycp=cn(cm.ycp),chg=cn(cm.chg),trade=cn(cm.trade),value=cn(cm.value),volume=cols.length>cm.volume?cn(cm.volume):0;
    if(ltp<=0&&ycp<=0)continue;stocks.push({code,ltp,high,low,ycp,chg,pct:ycp>0?Math.round(((ltp-ycp)/ycp)*10000)/100:0,trade:~~trade,value,volume:~~volume});}catch(e){continue;}}
  return stocks;
}

async function fetchData(){
  const btn=document.getElementById('rbtn');btn.disabled=true;
  document.getElementById('llo').classList.add('show');
  document.getElementById('lwrap').style.display='none';
  document.getElementById('lerr').style.display='none';
  const msgs=['Trying Amarstock API...','Trying DSE proxies...','Parsing stocks...','Building price history...','Computing REAL indicators...'];
  let mi=0;const el=document.getElementById('lmsg'),iv=setInterval(()=>{el.textContent=msgs[mi++%msgs.length];},1200);

  try {
    let raw = null;

    // Strategy 1: Try Amarstock
    el.textContent = 'Trying Amarstock...';
    try {
      raw = await Amarstock.fetchLatest();
      if (raw && raw.length > 0) {
        console.log(`✅ Got ${raw.length} stocks from Amarstock`);
      }
    } catch (e) {
      console.log('Amarstock unavailable, falling back to DSE');
    }

    // Strategy 2: Fall back to DSE scraping
    if (!raw || raw.length < 10) {
      el.textContent = 'Fetching from DSE...';
      const html = await fetchProxy(SOURCES.dse);
      raw = parseDSE(html);
    }

    clearInterval(iv);

    if (!raw || !raw.length) {
      throw new Error('No stock data from any source');
    }

    // Calculate pct if missing
    raw = raw.map(s => ({
      ...s,
      pct: s.pct || (s.ycp > 0 ? Math.round(((s.ltp - s.ycp) / s.ycp) * 10000) / 100 : 0)
    }));

    // Save to price history (builds over time!)
    el.textContent = `Saving history for ${raw.length} stocks...`;
    History.addToday(raw);

    // Analyze with real indicators
    el.textContent = `Computing indicators (${History.days(raw[0]?.code) || 0} days of history)...`;
    await new Promise(r => setTimeout(r, 30));
    S.stocks = analyzeAll(raw);
    S.t30 = false;
    processUI();

    // Show data quality summary
    const realCount = S.stocks.filter(s => s.dataQuality !== 'LOW').length;
    console.log(`\n📊 Data Quality Summary:`);
    console.log(`   ${S.stocks.filter(s => s.dataQuality === 'HIGH').length} stocks with HIGH quality (50+ days)`);
    console.log(`   ${S.stocks.filter(s => s.dataQuality === 'MEDIUM').length} stocks with MEDIUM quality (14-49 days)`);
    console.log(`   ${S.stocks.filter(s => s.dataQuality === 'LOW').length} stocks with LOW quality (estimated)`);
    console.log(`   📈 Use this site daily to build more history!\n`);

  } catch (e) {
    clearInterval(iv);
    document.getElementById('llo').classList.remove('show');
    document.getElementById('lerr').style.display = 'block';
    document.getElementById('etxt').innerHTML = `${e.message}<br><br>
      <button onclick="manualRefresh()" style="padding:8px 16px;background:var(--green);color:#000;border:none;border-radius:6px;cursor:pointer;font-weight:700">🔄 Force Refresh</button>`;
  }
  btn.disabled = false;
}
